<!DOCTYPE html>
<html>
<head>
    <title>Social Media Sentiment Analyzer</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">
        <h1>Social Media Sentiment Analysis</h1>

        <form method="POST">
            <textarea name="text" placeholder="Enter social media text..." required></textarea>
            <br>
            <button type="submit">Analyze</button>
        </form>

        {% if sentiment %}
            <div class="result">
                <h2>Sentiment: {{ sentiment }}</h2>
                <p>Polarity Score: {{ polarity }}</p>
            </div>
        {% endif %}
    </div>
</body>
</html>
